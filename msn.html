<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes Generales</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        h1 {
            text-align: center;
            padding: 1.5rem;
            background: #007bff;
            color: white;
            font-size: 1.5rem;
        }

        .subtitulo {
            text-align: center;
            padding: 0.5rem;
            background: #e9ecef;
            color: #555;
            font-size: 0.8rem;
        }

        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 1rem;
            background: #fafafa;
        }

        .mensaje {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .mensaje-propio {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .mensaje-otro {
            background: white;
            border: 1px solid #ddd;
            margin-right: auto;
        }

        .nombre {
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
        }

        .texto {
            font-size: 0.95rem;
        }

        .fecha {
            font-size: 0.65rem;
            text-align: right;
            margin-top: 0.3rem;
            color: #888;
        }

        .mensaje-propio .fecha {
            color: #ccc;
        }

        .formulario {
            padding: 1rem;
            background: white;
            border-top: 1px solid #ddd;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #0056b3;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 1rem;
            color: #dc3545;
        }

        .vacio {
            text-align: center;
            color: #999;
            padding: 2rem;
        }

        .info {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem;
            background: #f8f9fa;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Mensajes Generales</h1>
        <div class="subtitulo">📢 Todos los mensajes son públicos, se incluyen en Nota de participación.</div>
        
        <div class="chat-area" id="chatArea">
            <div class="loading">Cargando mensajes...</div>
        </div>
        
        <div class="formulario">
            <input type="text" id="nombre" placeholder="Tu nombre (ej: ALEGRE, el mismo de Usuario)" autocomplete="off">
            <textarea id="mensaje" placeholder="Escribe tu mensaje..."></textarea>
            <button onclick="enviarMensaje()">📨 Enviar mensaje</button>
        </div>
        <div class="info">💡 Los mensajes se guardan para siempre. Escribí con respeto.Contestar y ayudar a un compañero suma puntaje!!!</div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = "https://zfmoopsktswvsklsudvy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbW9vcHNrdHN3dnNrbHN1ZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI1NDYsImV4cCI6MjA5MTg0ODU0Nn0.68FZfRbWop0UY4psHQEwMWGKyF40bHHBucOGjpxs0JQ";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let mensajesActuales = [];

        // Formatear fecha
        function formatearFecha(fechaISO) {
            const fecha = new Date(fechaISO);
            const dia = fecha.getDate().toString().padStart(2, '0');
            const mes = (fecha.getMonth() + 1).toString().padStart(2, '0');
            const hora = fecha.getHours().toString().padStart(2, '0');
            const minutos = fecha.getMinutes().toString().padStart(2, '0');
            return `${dia}/${mes} ${hora}:${minutos}`;
        }

        // Cargar mensajes
        async function cargarMensajes() {
            const chatArea = document.getElementById('chatArea');
            
            try {
                const { data, error } = await supabaseClient
                    .from('msn')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                mensajesActuales = data || [];
                
                if (mensajesActuales.length === 0) {
                    chatArea.innerHTML = '<div class="vacio">💬 No hay mensajes aún. ¡Sé el primero en escribir!</div>';
                    return;
                }
                
                const nombreActual = document.getElementById('nombre').value.trim().toUpperCase();
                chatArea.innerHTML = '';
                
                mensajesActuales.forEach(msg => {
                    const esPropio = msg.nombre_alumno === nombreActual;
                    const div = document.createElement('div');
                    div.className = `mensaje ${esPropio ? 'mensaje-propio' : 'mensaje-otro'}`;
                    
                    div.innerHTML = `
                        <div class="nombre">${escapeHtml(msg.nombre_alumno)}</div>
                        <div class="texto">${escapeHtml(msg.mensaje)}</div>
                        <div class="fecha">${formatearFecha(msg.created_at)}</div>
                    `;
                    
                    chatArea.appendChild(div);
                });
                
                // Auto-scroll al final
                chatArea.scrollTop = chatArea.scrollHeight;
                
            } catch (error) {
                console.error('Error:', error);
                chatArea.innerHTML = '<div class="error">❌ Error al cargar mensajes</div>';
            }
        }

        // Enviar mensaje
        async function enviarMensaje() {
            const nombre = document.getElementById('nombre').value.trim().toUpperCase();
            const mensaje = document.getElementById('mensaje').value.trim();
            
            if (!nombre) {
                alert('Escribí tu nombre');
                return;
            }
            
            if (!mensaje) {
                alert('Escribí tu mensaje');
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('msn')
                    .insert({
                        nombre_alumno: nombre,
                        mensaje: mensaje
                    });
                
                if (error) throw error;
                
                // Limpiar y recargar
                document.getElementById('mensaje').value = '';
                await cargarMensajes();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al enviar mensaje');
            }
        }

        // Escapar HTML para seguridad
        function escapeHtml(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        // Suscripción en tiempo real
        function suscribirMensajes() {
            supabaseClient
                .channel('msn_channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'msn' }, 
                    () => cargarMensajes()
                )
                .subscribe();
        }
        
        // Enter para enviar
        document.getElementById('mensaje').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });
        
        // Recargar cuando cambia el nombre (para recolorear mensajes)
        document.getElementById('nombre').addEventListener('change', function() {
            cargarMensajes();
        });
        
        // Inicializar
        cargarMensajes();
        suscribirMensajes();
    </script>
</body>
</html>
