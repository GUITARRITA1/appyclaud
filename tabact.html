<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Entregas - Actividades y Carpetas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        h1 {
            text-align: center;
            padding: 1.5rem;
            color: #333;
            border-bottom: 2px solid #28a745;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #28a745;
            color: white;
            position: sticky;
            top: 0;
            font-weight: 600;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .entregado {
            background-color: #d4edda;
            color: #155724;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .no-entregado {
            background-color: #f8d7da;
            color: #721c24;
        }

        .loading, .error {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }

        .loading {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }

        .contador {
            padding: 1rem;
            text-align: right;
            background: #f8f9fa;
            font-size: 0.9rem;
            color: #666;
        }

        .check {
            font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            th, td {
                padding: 0.4rem;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.3rem;
                padding: 1rem;
            }
            .check {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Control de Entregas - Actividades y Carpetas</h1>
        <div class="contador" id="contador">Cargando datos...</div>
        <div style="overflow-x: auto;">
            <table id="tablaEntregas">
                <thead>
                    <tr id="filaAlumnos">
                        <th>ID</th>
                        <th>ALUMNO</th>
                        <th>Act1</th>
                        <th>Act2</th>
                        <th>Act3</th>
                        <th>Act4</th>
                        <th>Act5</th>
                        <th>Act6</th>
                        <th>Carp1</th>
                        <th>Carp2</th>
                        <th>Carp3</th>
                        <th>Carp4</th>
                        <th>Carp5</th>
                        <th>Carp6</th>
                    </tr>
                    <tr style="background-color: #1e7e34;">
                        <th style="background-color: #1e7e34;">#</th>
                        <th style="background-color: #1e7e34;">-</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                        <th style="background-color: #1e7e34;">dd/mm</th>
                     </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr><td colspan="12" class="loading">⏳ Cargando entregas......</td></tr>
                </tbody>
             </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zfmoopsktswvsklsudvy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbW9vcHNrdHN3dnNrbHN1ZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI1NDYsImV4cCI6MjA5MTg0ODU0Nn0.68FZfRbWop0UY4psHQEwMWGKyF40bHHBucOGjpxs0JQ";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const alumnos = [
            "ALENE", "BENITEZ", "CATA", "CENTURION", "COPA",
            "DIAZ", "DUE", "ESCOBAR", "ESPERANZA", "GENES",
            "IBANEZ", "LOBOS", "MAMANI", "MEDINA", "MELON",
            "MONROETA", "PACO", "RAULTA", "PONCE", "QUINTANILLA",
            "RUEDA", "SALAZAR", "TORREZ", "VALERO", "SOTELO", "NUEVO1", "NUEVO2", "NUEVO3", "NUEVO4",
        ];

        const actividades = ["Act1", "Act2", "Act3", "Act4", "Act5", "Act6", "Carp1", "Carp2", "Carp3", "Carp4", "Carp5", "Carp6",];

        async function cargarEntregas() {
            const tbody = document.getElementById('cuerpoTabla');
            const contador = document.getElementById('contador');
            
            try {
                const { data: entregas, error } = await supabaseClient
                    .from('entregas')
                    .select('nombre_alumno, tipo');
                
                if (error) throw error;
                
                // Crear mapa: alumno -> Set de tipos entregados
                const entregasPorAlumno = {};
                entregas.forEach(entrega => {
                    const alumno = entrega.nombre_alumno?.toUpperCase();
                    const tipo = entrega.tipo;
if (alumno && tipo && actividades.some(act => act.toLowerCase() === tipo.toLowerCase())) {
                        if (!entregasPorAlumno[alumno]) {
                            entregasPorAlumno[alumno] = new Set();
                        }
                        entregasPorAlumno[alumno].add(tipo);
                    }
                });
                
                // Contar entregas
                let total = 0;
                for (const a in entregasPorAlumno) total += entregasPorAlumno[a].size;
                contador.textContent = `📋 ${alumnos.length} alumnos | ✅ ${total} entregas`;
                
                tbody.innerHTML = '';
                
                alumnos.forEach((alumno, idx) => {
                    const row = tbody.insertRow();
                    const entregados = entregasPorAlumno[alumno] || new Set();
                    
                    row.insertCell(0).textContent = idx + 1;
                    
                    const celdaAlumno = row.insertCell(1);
                    celdaAlumno.textContent = alumno;
                    celdaAlumno.style.textAlign = 'left';
                    celdaAlumno.style.fontWeight = 'bold';
                    
                    actividades.forEach(act => {
                        const celda = row.insertCell();
                        if (entregados.has(act)) {
                            celda.innerHTML = '<span class="check">✅</span>';
                            celda.className = 'entregado';
                        } else {
                            celda.innerHTML = '❌';
                            celda.className = 'no-entregado';
                        }
                    });
                });
                
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="12" class="error">❌ Error: ${error.message}</td></tr>`;
            }
        }
        
        cargarEntregas();
    </script>
</body>
</html>
