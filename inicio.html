<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppyClaud - Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal */
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        /* Logo centrado */
        .logo {
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out;
        }

        .logo img {
            max-width: 300px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Contenedor de botones */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Estilo común de botones */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            .btn {
                font-size: 16px;
                padding: 12px 20px;
            }
            
            .logo img {
                max-width: 200px;
            }
        }
        
     .boton-chat {
    background: none;
    border: none;
    cursor: pointer;
    position: fixed;
    bottom: 100px;
    right: 20px;
    z-index: 1000;
}

.boton-chat img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    object-fit: cover;
}

.boton-chat img:hover {
    transform: scale(1.1);
}
        /* Para celulares: botón más chico */
@media (max-width: 600px) {
    .boton-chat {
        top: 10px;
        right: 10px;
    }
    
    .boton-chat img {
        width: 50px;
        height: 50px;
    }
}
    </style>
</head>
    
<body>
    <div class="container">
        <!-- Logo centrado -->
        <div class="logo">
            <img src="logon.png" alt="Logo AppyClaud">
        </div>

        <!-- Botones -->
        <div class="buttons-container">
            <a href="crono1.pdf" class="btn" target="_blank">📅 Calendario Planificación Tentativo</a>
            <a href="materiales.html" class="btn">📚 Materiales de clase</a>
            <a href="links.html" class="btn">🔗 Links de interés</a>
<BR>
            <a href="tabact.html" class="btn">🔗 SITUACION DE ENTREGAS DE ACTIVIDADES✅❌</a>
            <a href="notas.html" class="btn">🔗 NOTAS DE TP Y EVALUACIONES🅰️-1️⃣/🔟</a>

        </div>
    </div>
    
    <button class="boton-chat" onclick="window.open('msn.html', '_blank')">
    <img src="iconomsn.jpg" alt="Chat">
</button>
</body>
</html>
