<!DOCTYPE html>
<html>
  <head>
    <title>AppyClaud - Bienvenido</title>

    <style>

      
 <!-- primero mensaje emergente -->
/* Modal de imagen */
.modal-imagen {
        display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.modal-imagen-contenido {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    max-width: 90%;
    max-height: 90%;
}

.modal-imagen-contenido img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 8px;
}

.cerrar-modal-img {
    background: #ff4757;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 10px;
}

.cerrar-modal-img:hover {
    background: #e84118;
}
/* hasta aca para el menssaje emergente*/


     
      body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    /* ✅ FONDO SIEMPRE VISIBLE */
    background-image: url('APPYC.png');
    background-size: cover;        /* Cubre toda pantalla */
    background-position: center;   /* Centrado */
    background-repeat: no-repeat;  /* No repetir */
    background-attachment: fixed;  /* Fijo al scroll */
    min-height: 100vh;             /* Altura completa */
    </style>

     <style>
        .ingresar-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 30px 80px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin: 0 auto;     /* ← Esto centra */

        }

        .ingresar-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
 <!-- para el mensaje emergente -->
  <div id="modalEmergente" class="modal-imagen">
    <div class="modal-imagen-contenido">
        <img src="emergente.jpg" alt="Información importante">
        <br>
        <button class="cerrar-modal-img" onclick="cerrarModalImg()">Cerrar</button>
    </div>
</div>
<!-- fin emergemte -->
  
<body>
    <a href="inicio.html" class="ingresar-btn">INGRESAR</a>
</body>

 <!-- mns emergente -->
  <script>
    function mostrarModalImg() {
        document.getElementById('modalEmergente').style.display = 'flex';
    }
    
    function cerrarModalImg() {
        document.getElementById('modalEmergente').style.display = 'none';
    }
    
    // Mostrar al cargar la página
    setTimeout(mostrarModalImg, 500);
</script>


  
</html>
