<!DOCTYPE html>
<html>
  <head>
    <title>AppyClaud - Bienvenido</title>

    <style>

      
 <!-- primero mensaje emergente -->
/* Modal de imagen */
.modal-imagen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
}

.modal-imagen-contenido {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    max-width: 90%;
    max-height: 90%;
}

.modal-imagen-contenido img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 8px;
}

.cerrar-modal-img {
    background: #ff4757;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 10px;
}

.cerrar-modal-img:hover {
    background: #e84118;
}
/* hasta aca para el menssaje emergente*/


     
      body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    /* ✅ FONDO SIEMPRE VISIBLE */
    background-image: url('APPYC.png');
    background-size: cover;        /* Cubre toda pantalla */
    background-position: center;   /* Centrado */
    background-repeat: no-repeat;  /* No repetir */
    background-attachment: fixed;  /* Fijo al scroll */
    min-height: 100vh;             /* Altura completa */
    </style>

     <style>
        .ingresar-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 30px 80px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease;
    text-decoration: none;
    display: block;        /* ← Cambiar de inline-block a block */
    margin: 0 auto;        /* ← Ahora sí funciona */
    width: fit-content;    /* ← Para que no ocupe todo el ancho */
}

        .ingresar-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<!-- para el boton ingresar -->
  <div style="text-align: center;">
    <a href="menu.html" class="ingresar-btn">INGRESAR</a>
</div>
  
  <!-- para el mensaje emergente -->
  <div id="modalEmergente" class="modal-imagen">
    <div class="modal-imagen-contenido">
        <img src="emergente.jpg" alt="Información importante">
        <br>
        <button class="cerrar-modal-img" onclick="cerrarModalImg()">Cerrar</button>
    </div>
</div>
<!-- fin emergemte -->
  
<body>
    <a href="inicio.html" class="ingresar-btn">INGRESAR</a>
</body>

 <!-- mns emergente -->
  <script>
   function mostrarModalImg() {
    const modal = document.getElementById('modalEmergente');
    modal.style.display = 'flex';  // ← Cambiar a flex, no block
}

function cerrarModalImg() {
    const modal = document.getElementById('modalEmergente');
    modal.style.display = 'none';
}
    // Mostrar al cargar la página
    setTimeout(mostrarModalImg, 500);
</script>


  
</html>
