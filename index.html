<!DOCTYPE html>
<html>
  <head>
    <title>AppyClaud - Bienvenido</title>

    <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    /* ✅ FONDO SIEMPRE VISIBLE */
    background-image: url('APPYC.png');
    background-size: cover;        /* Cubre toda pantalla */
    background-position: center;   /* Centrado */
    background-repeat: no-repeat;  /* No repetir */
    background-attachment: fixed;  /* Fijo al scroll */
    min-height: 100vh;             /* Altura completa */
    </style>

     <style>
        .ingresar-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .ingresar-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <a href="inicio.html" class="ingresar-btn">INGRESAR</a>
</body>
</html>
