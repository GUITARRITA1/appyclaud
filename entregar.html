<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregar Trabajo - AppyClaud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            transform: scale(1.02);
        }
        .estado {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }
        .exito { background: #2ecc71; }
        .error { background: #e74c3c; }
        .cargando { background: #f39c12; }
        .info {
            font-size: 12px;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📤 Entregar Trabajo</h2>
        
        <input type="text" id="apellido" placeholder="APELLIDO" autocomplete="off">
        <input type="password" id="clave" placeholder="CÓDIGO" autocomplete="off">
        <input type="file" id="archivo" accept=".pdf">
        <button onclick="subirArchivo()">📥 Entregar PDF</button>
        
        <div id="mensaje"></div>
    </div>

    <script>
        // Configuración de Supabase (declarado UNA SOLA VEZ)
        const SUPABASE_URL = "https://zfmoopsktswvsklsudvy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbW9vcHNrdHN3dnNrbHN1ZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI1NDYsImV4cCI6MjA5MTg0ODU0Nn0.68FZfRbWop0UY4psHQEwMWGKyF40bHHBucOGjpxs0JQ";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Lista de alumnos (sin pistas)
        const alumnos = {
            "ARQUIMEDES": "ALENGRE",
            "CINETICA": "ALEJO",
            "TEMPERATURA": "BENITEZ",
            "ROZAMIENTO": "CALA",
            "ENERGIAS": "CENTURION",
            "INTERACTUACION": "CORIA",
            "MAGNITUD": "DIAZM",
            "alumno7": "DUE",
            "ENERGIA": "ESCOBAR",
            "alumno9": "ESPERANZA",
            "INTERCAMBIO": "GENES",
            "TRANSFERENCIA": "IBAÑEZ",
            "MAGNITUD": "LOBOS",
            "CLIMA": "MAMANI",
            "FUSION": "MEDINA",
            "CINETICA": "MELON",
            "alumno16": "MONROETA",
            "REGLAS": "MOLINA",
            "PROTON": "ORTIGOZA",
            "RADIOACTIVIDAD": "PACO",
            "ADIABATICO": "PERALTA",
            "KILOMETRO": "PONCE",
            "INTERPOLACION": "QUINTEROS",
            "FRONTERA": "RUEDA",
            "GRAVITACIONAL": "SALAZAR",
            "LONGITUD": "TORRES",
            "CERRADO": "VALENZUELA",
            "POTENCIAL": "SOTELO",
            "SISTEMA": "RIVAROLA",
            "CALOR": "VILARUO",
            "XXXX": "XXXX"

    };

        function normalizarTexto(texto) {
            return texto.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .trim();
        }

        // Función global para el botón
        window.subirArchivo = async function() {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.innerHTML = '';
            
            const apellidoIngresado = document.getElementById('apellido').value.trim();
            const clave = document.getElementById('clave').value.trim();
            const archivo = document.getElementById('archivo').files[0];
            
            // Validación
            if (!apellidoIngresado || !clave) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Acceso denegado</div>';
                return;
            }
            
            const apellidoEsperado = alumnos[clave];
            
            if (!apellidoEsperado) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Acceso denegado</div>';
                return;
            }
            
            if (normalizarTexto(apellidoIngresado) !== normalizarTexto(apellidoEsperado)) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Acceso denegado</div>';
                return;
            }
            
            if (!archivo) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Debe seleccionar un archivo PDF</div>';
                return;
            }
            
            if (archivo.type !== 'application/pdf') {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Solo se permiten archivos PDF</div>';
                return;
            }
            
            if (archivo.size > 5 * 1024 * 1024) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ El archivo no debe superar los 5MB</div>';
                return;
            }
            
            mensajeDiv.innerHTML = '<div class="estado cargando">⏳ Subiendo archivo...</div>';
            
            try {
                const timestamp = Date.now();
                const apellidoLimpio = apellidoIngresado.replace(/\s/g, '_');
                const archivoPath = `entregas/${timestamp}_${apellidoLimpio}_${archivo.name}`;
                
                const { error: uploadError } = await supabaseClient.storage
                    .from('entregas')
                    .upload(archivoPath, archivo);
                
                if (uploadError) throw new Error(uploadError.message);
                
                const { data: urlData } = supabaseClient.storage
                    .from('entregas')
                    .getPublicUrl(archivoPath);
                
                const { error: insertError } = await supabaseClient
                    .from('entregas')
                    .insert({
                        nombre_alumno: apellidoIngresado,
                        codigo_alumno: clave,
                        archivo_url: urlData.publicUrl,
                        archivo_nombre: archivo.name
                    });
                
                if (insertError) throw new Error(insertError.message);
                
                mensajeDiv.innerHTML = '<div class="estado exito">✅ Entrega realizada</div>';
                document.getElementById('apellido').value = '';
                document.getElementById('clave').value = '';
                document.getElementById('archivo').value = '';
                
            } catch (error) {
                mensajeDiv.innerHTML = `<div class="estado error">❌ Error: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
