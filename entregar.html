<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregar Trabajo - AppyClaud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        button:hover {
            transform: scale(1.02);
        }
        .estado {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }
        .exito { background: #2ecc71; }
        .error { background: #e74c3c; }
        .cargando { background: #f39c12; }
        h2 {
            margin-bottom: 20px;
        }
        .info {
            font-size: 12px;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📤 Entregar Trabajo</h2>
        
        <input type="text" id="apellido" placeholder="Tu APELLIDO (ej: Benitez, Diaz, Sotelo)" autocomplete="off">
        <input type="text" id="clave" placeholder="Código de alumno (ej: alumno1)" autocomplete="off">
        <input type="file" id="archivo" accept=".pdf" required>
        <button onclick="subirArchivo()">📥 Entregar PDF</button>
        
        <div id="mensaje"></div>
        <div class="info">🔐 Usa tu APELLIDO (solo el primero) y el código que te dio el profesor</div>
    </div>

    <script>
        // 🔑 CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = "https://zfmoopsktswvsklsudvy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmbW9vcHNrdHN3dnNrbHN1ZHZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzI1NDYsImV4cCI6MjA5MTg0ODU0Nn0.68FZfRbWop0UY4psHQEwMWGKyF40bHHBucOGjpxs0JQ";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 📋 LISTA DE ALUMNOS AUTORIZADOS
        // clave → { apellidoEsperado, nombreCompleto }
        const alumnosAutorizados = {
            "alumno1": { apellido: "Alene", nombreCompleto: "Alene Dylan" },
            "alumno2": { apellido: "Benitez", nombreCompleto: "Benitez Valdez, Fausta" },
            "alumno3": { apellido: "Cata", nombreCompleto: "Cata Melany" },
            "alumno4": { apellido: "Centurion", nombreCompleto: "Centurion Benitez, Magas" },
            "alumno5": { apellido: "Copa", nombreCompleto: "Copa, Priscilla" },
            "alumno6": { apellido: "Diaz", nombreCompleto: "Diaz, Mia" },
            "alumno7": { apellido: "Due", nombreCompleto: "Due, Ornella" },
            "alumno8": { apellido: "Escobar", nombreCompleto: "Escobar Tevez, Tiziano" },
            "alumno9": { apellido: "Esperanza", nombreCompleto: "Esperanza, Paul" },
            "alumno10": { apellido: "Genes", nombreCompleto: "Genes Morales, Lautaro" },
            "alumno11": { apellido: "Ibañez", nombreCompleto: "Ibañez, Morena" },
            "alumno12": { apellido: "Lobos", nombreCompleto: "Lobos, Morena" },
            "alumno13": { apellido: "Mamani", nombreCompleto: "Mamani Laura, Luz" },
            "alumno14": { apellido: "Medina", nombreCompleto: "Medina, Kevin" },
            "alumno15": { apellido: "Melon", nombreCompleto: "Melon, Erik" },
            "alumno16": { apellido: "Monroeta", nombreCompleto: "Monroeta, Matías" },
            "alumno17": { apellido: "Paco", nombreCompleto: "Paco Chambi, Juarez" },
            "alumno18": { apellido: "Raulta", nombreCompleto: "Raulta, Luna" },
            "alumno19": { apellido: "Ponce", nombreCompleto: "Ponce, Alma" },
            "alumno20": { apellido: "Quintanilla", nombreCompleto: "Quintanilla, Giuliana" },
            "alumno21": { apellido: "Rueda", nombreCompleto: "Rueda, Rocío" },
            "alumno22": { apellido: "Salazar", nombreCompleto: "Salazar Lozano, Tía" },
            "alumno23": { apellido: "Torres", nombreCompleto: "Torres, Julia" },
            "alumno24": { apellido: "Valero", nombreCompleto: "Valero Eulalia, Alex" },
            "alumno25": { apellido: "Sotelo", nombreCompleto: "Sotelo Márquez, Mariano Ramón" }
        };

        // Función para normalizar texto (quitar acentos y pasar a minúscula)
        function normalizarTexto(texto) {
            return texto.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "") // elimina acentos
                .trim();
        }

        async function subirArchivo() {
            const apellidoIngresado = document.getElementById('apellido').value.trim();
            const clave = document.getElementById('clave').value.trim();
            const archivo = document.getElementById('archivo').files[0];
            const mensajeDiv = document.getElementById('mensaje');
            
            // Validar campos vacíos
            if (!apellidoIngresado || !clave || !archivo) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Completa TODOS los campos</div>';
                return;
            }
            
            // Validar que el archivo sea PDF
            if (archivo.type !== 'application/pdf') {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Solo se permiten archivos PDF</div>';
                return;
            }
            
            // Validar que el archivo no pese más de 5MB
            if (archivo.size > 5 * 1024 * 1024) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ El archivo no debe superar los 5MB</div>';
                return;
            }
            
            // 🔐 VALIDAR CLAVE DEL ALUMNO
            const alumno = alumnosAutorizados[clave];
            
            if (!alumno) {
                mensajeDiv.innerHTML = '<div class="estado error">❌ Código de alumno NO válido. Contacta al profesor.</div>';
                return;
            }
            
            // Normalizar ambos textos para comparar sin sensibilidad a mayúsculas/minúsculas ni acentos
            const apellidoNormalizado = normalizarTexto(apellidoIngresado);
            const apellidoEsperadoNormalizado = normalizarTexto(alumno.apellido);
            
            // Validar que el apellido ingresado coincida con el esperado
            if (apellidoNormalizado !== apellidoEsperadoNormalizado) {
                mensajeDiv.innerHTML = `<div class="estado error">❌ El apellido "${apellidoIngresado}" no corresponde al código "${clave}". Apellido esperado: ${alumno.apellido}</div>`;
                return;
            }
            
            // Mostrar mensaje de carga
            mensajeDiv.innerHTML = '<div class="estado cargando">⏳ Subiendo archivo, espera...</div>';
            
            try {
                // 1. Generar nombre único para el archivo
                const timestamp = Date.now();
                const apellidoLimpio = apellidoIngresado.replace(/\s/g, '_');
                const archivoPath = `entregas/${timestamp}_${apellidoLimpio}_${archivo.name}`;
                
                // 2. Subir archivo a Supabase Storage
                const { error: uploadError } = await supabase.storage
                    .from('entregas')
                    .upload(archivoPath, archivo);
                
                if (uploadError) {
                    throw new Error(`Error al subir: ${uploadError.message}`);
                }
                
                // 3. Obtener la URL pública del archivo
                const { data: urlData } = supabase.storage
                    .from('entregas')
                    .getPublicUrl(archivoPath);
                
                const archivoUrl = urlData.publicUrl;
                
                // 4. Guardar registro en la tabla "entregas"
                const { error: insertError } = await supabase
                    .from('entregas')
                    .insert({
                        nombre_alumno: alumno.nombreCompleto,
                        apellido_usado: apellidoIngresado,
                        codigo_alumno: clave,
                        archivo_url: archivoUrl,
                        archivo_nombre: archivo.name,
                        fecha_subida: new Date().toISOString()
                    });
                
                if (insertError) {
                    throw new Error(`Error al guardar: ${insertError.message}`);
                }
                
                // Éxito
                mensajeDiv.innerHTML = `<div class="estado exito">✅ ¡Entrega realizada con éxito! ${alumno.nombreCompleto}</div>`;
                document.getElementById('apellido').value = '';
                document.getElementById('clave').value = '';
                document.getElementById('archivo').value = '';
                
            } catch (error) {
                console.error("Error detallado:", error);
                mensajeDiv.innerHTML = `<div class="estado error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
