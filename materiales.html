<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal */
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        /* Logo centrado */
        .logo {
            margin-bottom: 50px;
            animation: fadeIn 1s ease-out;
        }

        .logo img {
            max-width: 300px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Contenedor de botones */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Estilo común de botones */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            .btn {
                font-size: 16px;
                padding: 12px 20px;
            }
            
            .logo img {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo centrado -->
        <div class="logo">
            <img src="logon.png" alt="Logo AppyClaud">
        </div>

        <!-- Botones -->
        <div class="buttons-container">

            <a href="matc2.html" class="btn">📚 Materiales de clase 1</a>

            <a href="matc6.html" class="btn">📚 Materiales de clase 1</a>
            <a href="matc7.html" class="btn">📚 Materiales de clase 1</a>
            <a href="matc8.html" class="btn">📚 Materiales de clase 1</a>
            <a href="matc9.html" class="btn">📚 Materiales de clase 1</a>
    <a href="matlinl.html" class="btn">🔗 Links de interés</a>

        </div>
    </div>
</body>
</html>
